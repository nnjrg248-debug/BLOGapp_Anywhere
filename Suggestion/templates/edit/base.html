{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Log</title>
    <!-- Bootstrap CSSの読み込み -->
<!-- 速度遅い場合「htmlファイルのhttps://で始まる行が原因でないか」とのことで以下をコメントにしたらはやくなった　-->
    <!-- <link href="https://jsdelivr.net" rel="stylesheet"> -->
      <!-- 検索エンジン用の説明文 -->
    <meta name="description" content="{{ post.content|truncatechars:100 }}">

    <!-- OGP設定（SNS用） -->
    <meta property="og:title" content="{{ post.title }} | 私のブログ">
    <meta property="og:description" content="{{ post.content|truncatechars:100 }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <!-- 記事に画像がある場合はそのURL、ない場合はデフォルト画像 -->
    <meta property="og:image" content="{% if post.image %}{{ post.image.url }}{% else %}https://example.com{% endif %}">
    
    <!-- X（旧Twitter）用のカード設定 -->
    <meta name="twitter:card" content="summary_large_image">
    <!-- jQuery（最優先） -->



    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap（CSS → JS の順） -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <!-- Summernote（CSS → JS の順） -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.18/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.18/summernote-bs4.min.js"></script>

    <script src="{% static 'js/like.js' %}"></script>


</head>
<body class="bg-light">

 
    <!--<nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'memo_list' %}">My Notepad</a>
       </div>
    
    </nav>
    <div class="flex items-center space-x-4 text-sm text-gray-600"> 
    <div class="flex justify-start items-center space-x-4 text-sm text-gray-600 w-full">-->
    <div class="w-full flex justify-end items-center space-x-4 text-sm text-gray-600 pr-4 py-2">     
        <!-- ログインしている人だけにユーザー名を表示 -->       

        <!-- 未ログインの人も含めて、全員にログアウトを表示 -->
        <a href="{% url 'post_list' %}" class="text-blue-500 hover:underline">Ｔｏｐ</a>
         {% if user.is_authenticated %}
            &nbsp; &nbsp;   <span>👤 {{ user.username }}</span>
        {% endif %}
    </div>


    <div class="container">
        <!-- ここに各ページの中身が流し込まれます -->
        {% block content %}
        {% endblock %}
    </div>
    <br>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <!--
        <div class="container">
            <a href="{% url 'post_list'%}">ログアウト画面へ</a>
        </div>
        -->
        
    </nav>    
    <!--<script src="{% static 'js/ai_button.js' %}"></script>-->
</body>
</html>
